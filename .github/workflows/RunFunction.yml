name: 修改微信步数

on:
  workflow_dispatch:
  # 如果想自动运行，可以取消下面三行的注释
  # schedule:
  #   - cron: '30 2,10 * * *' # 建议避开整点，这里是 UTC 时间（北京时间 +8 小时）

jobs: 
  ChangBuShu: 
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      # 升级到 v4，性能更好更安全
      uses: actions/checkout@v4
      
    - name: Set up Python
      # 升级到 v5，它会自动下载并安装系统缺失的 Python 版本
      uses: actions/setup-python@v5
      with:
        python-version: '3.10' # 建议用 3.10，稳定性更好
        
    - name: 安装环境
      run: |
        python -m pip install --upgrade pip
        pip install -r ./requirements.txt
      
    - name: 随机延迟执行
      # 为了规避 "too many requests"，在执行前随机等待 1-60 秒
      run: sleep $(( ( RANDOM % 60 )  + 1 ))

    - name: 修改步数
      run: python3 changebushu_Action.py
      env:
        USER_PHONE: ${{ secrets.USER_PHONE }}
        USER_PWD: ${{ secrets.USER_PWD }}
        STEP: ${{ secrets.STEP }}
        STEP_MIN: ${{ secrets.STEP_MIN }}
        STEP_MAX: ${{ secrets.STEP_MAX }}
